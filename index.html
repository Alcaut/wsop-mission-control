// ─── UTILS ────────────────────────────────────────────────────────────────────
function beep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Critical: triple burst, very high pitch — imposible de ignorar
    const seq = type === 'critical' ? [[1760, .08], [1760, .08], [2093, .08], [2093, .08], [1760, .15], [2093, .25]] : type === 'high' ? [[1319, .1], [1568, .14], [1319, .08], [1568, .12]] : [[880, .1], [1047, .1]];
    let t = ctx.currentTime;
    seq.forEach(([f, d]) => {
      const o = ctx.createOscillator(),
        g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(.45, t);
      g.gain.exponentialRampToValueAtTime(.001, t + d);
      o.start(t);
      o.stop(t + d);
      t += d + .04;
    });
  } catch (e) {}
}
function t2m(s) {
  if (!s || s === '--' || s === 'TBD') return null;
  const nx = s.includes('+1');
  const p = s.replace('+1', '').split(':');
  if (p.length < 2) return null;
  return parseInt(p[0], 10) * 60 + parseInt(p[1], 10) + (nx ? 1440 : 0);
}
function nmins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}
// Forzar 24hs — evita que el locale del sistema use AM/PM al guardar timestamps
function tstr() {
  return new Date().toLocaleTimeString('es-AR', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  });
}
function fmtClk(d) {
  return d.toLocaleTimeString('es-AR', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });
}
// IMPORTANTE: usar fecha LOCAL (no UTC) — en BsAs UTC-3 las 22hs = 01hs UTC del día siguiente
function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function clockStr(mins) {
  const m = (mins + 1440) % 1440;
  return String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');
}
function minutesSince(timeStr) {
  if (!timeStr) return null;
  // Handle both "23:05" (24h) and "11:00 p. m." (12h AM/PM from old locale)
